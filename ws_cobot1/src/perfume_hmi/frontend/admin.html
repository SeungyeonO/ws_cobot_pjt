<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>조향 로봇 관리자 HMI</title>
    <link rel="stylesheet" href="admin.css" />
</head>
<body>
    <!-- 상단 바: 타이틀 + 로봇 연결 상태 + 현재 시각 -->
    <header class="topbar">
        <h1>조향 로봇 관리자 <span class="sub">M0609 · dsr01</span></h1>
        <div class="topbar-right">
            <span id="conn-badge" class="badge off">연결 확인 중...</span>
            <span id="clock" class="clock"></span>
            <button id="btn-logout" class="back-link logout-btn" type="button">로그아웃</button>
        </div>
    </header>

    <main class="grid">
        <!-- 1. 로봇 상태 (조인트 각도 / 그리퍼 / TCP 힘) -->
        <section class="panel">
            <h2>로봇 상태</h2>
            <div class="joints" id="joints">
                <!-- J1~J6 값은 admin.js가 채움 -->
            </div>
            <p class="panel-note">조인트 스트림 기준 연결 판정 (2초 이상 미수신 시 끊김)</p>

            <!-- 모션(동작 중/정지)은 조인트 각도 변화로 판정하는 값이라 이 패널 소속 -->
            <div class="subsection">
                <div class="subsection-head">
                    <span class="sub-label">모션</span>
                    <span id="motion-badge" class="badge idle">--</span>
                </div>
            </div>

            <div class="subsection">
                <div class="subsection-head">
                    <span class="sub-label">TCP 힘/토크</span>
                </div>
                <div class="force-grid" id="force-grid">
                    <!-- Fx~Mz 값은 admin.js가 채움 -->
                </div>
            </div>

            <div class="subsection">
                <div class="subsection-head">
                    <span class="sub-label">그리퍼</span>
                    <span id="gripper-badge" class="badge idle">서버 대기 중</span>
                </div>
            </div>
        </section>

        <!-- 2. 제조 현황 (현재 제조 상태 + 최근 이력)
             로봇 모션은 로봇 상태 패널로 이동, 키오스크 잠금은 제어 패널 토글이
             상태 표시를 겸한다 — 이 패널은 제조 관련 정보만 넉넉하게 쓴다. -->
        <section class="panel">
            <h2>제조 현황</h2>

            <div class="subsection making-section">
                <div class="subsection-head">
                    <span class="sub-label">제조 상태</span>
                    <div id="making-state" class="making-state idle">대기 중</div>
                </div>
                <div id="making-detail" class="making-detail"></div>
                <!-- 마감(성공/실패)된 제조만 1건 1행 — 백엔드 SQLite에 저장되어 재시작에도 유지 -->
                <div class="history-head">최근 제조 이력</div>
                <ul id="making-history" class="making-history">
                    <li class="empty">아직 제조 이력이 없습니다.</li>
                </ul>
            </div>
        </section>

        <!-- 3. 제어 -->
        <section class="panel">
            <h2>제어</h2>
            <div class="stop-ring">
                <button id="btn-stop" class="stop-btn" type="button">정지<span class="stop-sub">STOP</span></button>
            </div>
            <!-- 정지 = /stop_perfume 발행 — 실제 정지(move_stop + 시퀀스 중단)는 cobot_control이 수행.
                 재개/복구 개념 없음: 정지하면 cobot_control이 종료되므로 새 주문은 재실행 후 받는다.
                 소프트웨어 정지라 안전 정지/비상 정지가 아님. Safe-Off 복구는 티칭펜던트로. -->
            <!-- 일시정지/재개 버튼은 제거됨 — 두산 ROS2 드라이버가 모션 진행 중에
                 move_pause 요청에 응답하지 못하는 구조라 실사용 불가 (robot_bridge.py 주석 참고) -->
            <div class="ctl-group">
                <span class="ctl-label">모션</span>
                <button id="btn-home" class="btn secondary ctl-home" type="button">홈 복귀</button>
            </div>
            <div class="ctl-group">
                <span class="ctl-label">그리퍼</span>
                <div class="seg">
                    <button id="btn-grip-open" class="seg-btn" type="button">열기</button>
                    <button id="btn-grip-close" class="seg-btn" type="button">닫기</button>
                </div>
            </div>
            <div class="ctl-group">
                <span class="ctl-label">속도 모드</span>
                <div class="seg">
                    <button id="btn-speed-normal" class="seg-btn" type="button">일반</button>
                    <button id="btn-speed-reduced" class="seg-btn warn" type="button">감속</button>
                </div>
            </div>
            <div class="ctl-group">
                <span class="ctl-label">키오스크 잠금</span>
                <label class="switch">
                    <input type="checkbox" id="chk-lock">
                    <span class="switch-track"><span class="switch-knob"></span></span>
                </label>
            </div>
            <p id="control-msg" class="control-msg"></p>
        </section>

        <!-- 4. 로그 — 에러뿐 아니라 INFO/WARN 레벨 이벤트(드라이버 메시지, 자동 정지 결과 등)도 함께 뜬다 -->
        <section class="panel panel-wide">
            <h2>로그 <span class="sub">최근 20건</span>
                <button id="btn-clear-errors" class="h2-btn" type="button">지우기</button></h2>
            <ul id="error-list" class="error-list">
                <li class="empty">기록된 로그가 없습니다.</li>
            </ul>
        </section>
    </main>

    <script src="admin.js"></script>
</body>
</html>
